<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#ea580c" />
        <meta
            name="description"
            content="Word Up — a two-sided marketplace connecting creative writers with businesses."
        />
        <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
        <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
        <title>Word Up — Connect Writers & Businesses</title>
        <!-- SPA redirect decode: restores path after GitHub Pages 404 redirect -->
        <script type="text/javascript">
          (function(l) {
            if (l.search[1] === '/') {
              var decoded = l.search.slice(1).split('&').map(function(s) {
                return s.replace(/~and~/g, '&');
              });
              window.history.replaceState(null, null,
                l.pathname.slice(0, -1) + decoded[0] +
                (decoded[1] ? '?' + decoded[1] : '') +
                l.hash
              );
            }
          }(window.location));
        </script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
    </body>
</html>
