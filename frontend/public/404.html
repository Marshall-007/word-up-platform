<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Word Up</title>
    <script type="text/javascript">
      // SPA redirect for GitHub Pages — keeps React Router working on refresh/direct URL.
      // Encodes the path into a query param and redirects to the root so index.html is served.
      var segmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
