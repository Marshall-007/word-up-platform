name: Deploy to GitHub Pages

on:
  push:
    branches: [main, claude/word-up-publishable-upgrade-0njknp]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Build
        working-directory: frontend
        env:
          # If no backend is hosted, build in DEMO MODE: the entire API runs in
          # the browser (localStorage) so the published site is fully functional
          # — sign up, upload documents, discover, purchase, download.
          # Add a REACT_APP_BACKEND_URL repo secret (your deployed API URL) to
          # switch demo mode off and talk to the real backend instead.
          REACT_APP_BACKEND_URL: ${{ secrets.REACT_APP_BACKEND_URL || 'http://localhost:8000' }}
          REACT_APP_DEMO_MODE: ${{ secrets.REACT_APP_BACKEND_URL && 'false' || 'true' }}
          PUBLIC_URL: /word-up-platform
          CI: false
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
